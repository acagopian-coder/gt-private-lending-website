
backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  - name: "settings"
    label: "Site Settings"
    files:
      - name: "hero"
        label: "Hero Section"
        file: "content/hero.json"
        fields:
          - { label: "Headline Line 1", name: "line1", widget: "string", default: "Capital" }
          - { label: "Headline Line 2", name: "line2", widget: "string", default: "engineered" }
          - { label: "Headline Line 3", name: "line3", widget: "string", default: "to close." }
          - { label: "Subtext", name: "subtext", widget: "text", default: "GT Private Lending is a direct lender backed by institutional capital" }
          - { label: "Hero Image", name: "image", widget: "image" }

      - name: "stats"
        label: "Stats Bar"
        file: "content/stats.json"
        fields:
          - label: "Stats"
            name: "stats"
            widget: "list"
            fields:
              - { label: "Number", name: "num", widget: "string" }
              - { label: "Label", name: "label", widget: "string" }

      - name: "about"
        label: "About Section"
        file: "content/about.json"
        fields:
          - { label: "Headline", name: "headline", widget: "string" }
          - { label: "Paragraph 1", name: "para1", widget: "text" }
          - { label: "Paragraph 2", name: "para2", widget: "text" }
          - { label: "Paragraph 3", name: "para3", widget: "text" }
          - { label: "About Image", name: "image", widget: "image" }

  - name: "programs"
    label: "Loan Programs"
    folder: "content/programs"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Program Name", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Program Image", name: "image", widget: "image" }
      - label: "Specs"
        name: "specs"
        widget: "list"
        fields:
          - { label: "Label", name: "key", widget: "string" }
          - { label: "Value", name: "value", widget: "string" }
